services:
  proxy:
    image: traefik:v3.1
    container_name: site_facil_proxy
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  site:
    image: nginx:alpine
    container_name: site_facil_web
    restart: always
    volumes:
      - "./site:/usr/share/nginx/html:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sitefacil.rule=PathPrefix(`/`)"
      - "traefik.http.routers.sitefacil.entrypoints=web"
      - "traefik.http.services.sitefacil.loadbalancer.server.port=80"
